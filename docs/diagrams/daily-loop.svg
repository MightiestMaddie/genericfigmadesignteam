<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 -8 1098 766" width="1098" height="766">
<rect x="6" y="-8" width="1098" height="766" fill="#ffffff"/>
<text x="30" y="40.9" font-size="30" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#1e1e1e" text-anchor="start">After setup — the daily loop</text>
<text x="30" y="72.0" font-size="14.5" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#868e96" text-anchor="start">Page agents build screens from the library; anything missing becomes a candidate that YOU decide on.</text>
<rect x="40" y="130" width="240" height="76" rx="10" fill="#fff9db" stroke="#f59f00" stroke-width="2"/>
<text x="160.0" y="152.4" font-size="15" font-family='"Cascadia Code", Menlo, Consolas, monospace' fill="#b45309" text-anchor="middle">/page-agent &lt;screen&gt;</text>
<text x="160.0" y="176.4" font-size="12.5" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#868e96" text-anchor="middle">builds the screen from</text>
<text x="160.0" y="192.0" font-size="12.5" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#868e96" text-anchor="middle">library instances</text>
<path d="M 280.0,168.0 L 330.0,168.0" fill="none" stroke="#1e1e1e" stroke-width="2" stroke-linecap="round"/>
<polygon points="330.0,168.0 320.1,172.8 320.1,163.2" fill="#1e1e1e"/>
<polygon points="420.0,126 510,168.0 420.0,210 330,168.0" fill="#f8f9fa" stroke="#495057" stroke-width="2"/>
<text x="420.0" y="163.6" font-size="14" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#1e1e1e" text-anchor="middle">something</text>
<text x="420.0" y="181.1" font-size="14" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#1e1e1e" text-anchor="middle">missing?</text>
<text x="425" y="228.8" font-size="13" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#2f9e44" text-anchor="start">no</text>
<path d="M 420.0,210.0 L 420.0,300.0" fill="none" stroke="#2f9e44" stroke-width="2" stroke-linecap="round"/>
<polygon points="420.0,300.0 415.2,290.1 424.8,290.1" fill="#2f9e44"/>
<rect x="330" y="300" width="180" height="64" rx="10" fill="#d3f9d8" stroke="#2f9e44" stroke-width="2"/>
<text x="420.0" y="322.4" font-size="15" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#1b6e30" text-anchor="middle">screen done</text>
<text x="420.0" y="344.4" font-size="12.5" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#868e96" text-anchor="middle">commit the records</text>
<text x="516" y="150.8" font-size="13" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#b45309" text-anchor="start">yes</text>
<path d="M 510.0,168.0 L 560.0,168.0" fill="none" stroke="#b45309" stroke-width="2" stroke-linecap="round"/>
<polygon points="560.0,168.0 550.1,172.8 550.1,163.2" fill="#b45309"/>
<rect x="560" y="130" width="250" height="76" rx="10" fill="#fff9db" stroke="#f59f00" stroke-width="2"/>
<text x="685.0" y="150.9" font-size="15.5" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#b45309" text-anchor="middle">builds a CANDIDATE</text>
<text x="685.0" y="173.0" font-size="12" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#868e96" text-anchor="middle">page-local &amp; token-bound,</text>
<text x="685.0" y="188.0" font-size="12" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#868e96" text-anchor="middle">in a CANDIDATES frame</text>
<text x="806" y="150.0" font-size="12" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#868e96" text-anchor="start">reports it</text>
<path d="M 810.0,168.0 L 860.0,168.0" fill="none" stroke="#1e1e1e" stroke-width="2" stroke-linecap="round"/>
<polygon points="860.0,168.0 850.1,172.8 850.1,163.2" fill="#1e1e1e"/>
<rect x="860" y="130" width="185" height="76" rx="10" fill="#e7f5ff" stroke="#1971c2" stroke-width="2"/>
<text x="952.5" y="153.7" font-size="16.5" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#1971c2" text-anchor="middle">YOU decide</text>
<text x="952.5" y="177.5" font-size="11.5" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#868e96" text-anchor="middle">Librarian records it as</text>
<text x="952.5" y="191.9" font-size="11.5" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#868e96" text-anchor="middle">pending-review</text>
<path d="M 910.0,206.0 L 750.0,300.0" fill="none" stroke="#2f9e44" stroke-width="2" stroke-linecap="round"/>
<polygon points="750.0,300.0 756.1,290.9 761.0,299.1" fill="#2f9e44"/>
<text x="760.0" y="251.2" font-size="13.5" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#2f9e44" text-anchor="middle">PROMOTE</text>
<path d="M 985.0,206.0 L 985.0,300.0" fill="none" stroke="#495057" stroke-width="2" stroke-linecap="round"/>
<polygon points="985.0,300.0 980.2,290.1 989.8,290.1" fill="#495057"/>
<text x="1000" y="251.2" font-size="13.5" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#495057" text-anchor="start">ONE-OFF</text>
<rect x="620" y="300" width="260" height="92" rx="10" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2"/>
<text x="750.0" y="320.4" font-size="15" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#1b6e30" text-anchor="middle">Librarian builds it</text>
<text x="750.0" y="341.5" font-size="11.5" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#495057" text-anchor="middle">in the right Section, fully bound,</text>
<text x="750.0" y="355.9" font-size="11.5" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#495057" text-anchor="middle">documented in SKILL.md,</text>
<text x="750.0" y="370.3" font-size="11.5" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#495057" text-anchor="middle">candidate swapped for instances</text>
<rect x="900" y="300" width="170" height="92" rx="10" fill="#f8f9fa" stroke="#495057" stroke-width="2"/>
<text x="985.0" y="323.6" font-size="14" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#1e1e1e" text-anchor="middle">stays page-local</text>
<text x="985.0" y="345.5" font-size="11.5" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#868e96" text-anchor="middle">never enters the</text>
<text x="985.0" y="359.9" font-size="11.5" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#868e96" text-anchor="middle">library (tombstone)</text>
<path d="M 750.0,392.0 L 750.0,438.0" fill="none" stroke="#862e9c" stroke-width="2" stroke-linecap="round"/>
<polygon points="750.0,438.0 745.2,428.1 754.8,428.1" fill="#862e9c"/>
<rect x="620" y="438" width="260" height="64" rx="10" fill="#f3d9fa" stroke="#862e9c" stroke-width="2"/>
<text x="750.0" y="458.4" font-size="15" font-family='"Cascadia Code", Menlo, Consolas, monospace' fill="#862e9c" text-anchor="middle">/reconcile  + commit</text>
<text x="750.0" y="482.0" font-size="12" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#868e96" text-anchor="middle">keeps records ↔ library in sync</text>
<path d="M 620.0,470.0 L 160.0,470.0 L 160.0,206.0" fill="none" stroke="#868e96" stroke-width="2" stroke-linecap="round" stroke-dasharray="8 6"/>
<polygon points="160.0,206.0 164.8,215.9 155.2,215.9" fill="#868e96"/>
<text x="190" y="488.4" font-size="12.5" font-family='Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive' fill="#868e96" text-anchor="start">the library grows — the next screen needs fewer candidates</text>
</svg>